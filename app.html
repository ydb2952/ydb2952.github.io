<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小🍐 专属点餐台</title>
  <script>
    // 检测是否来自 direct 访问（无 referer）
    const isDirectAccess = document.referrer === '' || document.referrer === window.location.href;

    if (isDirectAccess) {
      // 重定向到真实应用
      window.location.href = 'app.html';
    } else {
      // 正常访问，跳转到子目录
      window.location.href = 'app.html';
    }
  </script>
</head>
<body>
</html>

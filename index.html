<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>小🍐 专属点餐台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 顶部栏 -->
  <header class="header">
    <h1>小🍐 专属点餐台</h1>
    <div class="header-icons">
      <button class="icon-btn" id="settingsBtn">⚙️</button>
      <button class="icon-btn" id="historyBtn">📋</button>
    </div>
  </header>

  <!-- 分类导航 -->
  <nav class="category-nav" id="categoryNav">
    <!-- 动态生成分类按钮 -->
  </nav>

  <!-- 菜品列表 -->
  <main class="dish-grid" id="dishGrid">
    <!-- 动态生成菜品卡片 -->
  </main>

  <!-- 购物袋按钮 -->
  <div class="cart-badge" id="cartBadge">
    🛒
    <span class="count cart-count" id="cartCount">0</span>
  </div>

  <!-- 购物袋弹窗 -->
  <div class="cart-modal" id="cartModal">
    <div class="cart-header">
      <h2>购物袋</h2>
      <button class="icon-btn" id="closeCartBtn">✕</button>
    </div>
    <div class="cart-items" id="cartItems">
      <!-- 动态生成购物车项目 -->
    </div>
    <div class="cart-footer">
      <input type="text" class="note-input" id="orderNote" placeholder="备注：少辣、免葱等">
      <div class="cart-total">
        总计: <span id="cartTotal">¥0</span>
      </div>
      <div class="cart-actions">
        <button class="clear-btn" id="clearCartBtn">清空</button>
        <button class="checkout-btn" id="checkoutBtn">去结算</button>
      </div>
    </div>
  </div>

  <!-- 订单记录界面 -->
  <div id="orderHistory" class="order-history">
    <header class="header">
      <h1>订单记录</h1>
      <button class="icon-btn" id="backBtn">←</button>
    </header>
    <main class="order-list" id="orderList">
      <!-- 动态生成订单列表 -->
    </main>
  </div>

  <!-- 管理菜单 -->
  <div class="modal-overlay" id="menuOverlay"></div>
  <div class="admin-menu admin-menu-dropdown" id="adminMenu">
    <button class="admin-menu-item" id="manageDishesBtn">🍽️ 菜品管理</button>
    <button class="admin-menu-item" id="manageCategoriesBtn">📂 分类管理</button>
    <button class="admin-menu-item" id="manageOrdersBtn">📋 订单记录</button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/utils.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCF1p2yOenuFcz_QLOLk2t-90YHzvOToTk",
      authDomain: "xiaolifood.firebaseapp.com",
      projectId: "xiaolifood",
      storageBucket: "xiaolifood.firebasestorage.app",
      messagingSenderId: "804456151001",
      appId: "1:804456151001:web:50458a5c3df534be474bc8"
    };

    firebase.initializeApp(firebaseConfig);
    const firestore = firebase.firestore();

    // 将方法挂载到全局
    window.db = {};

    // 菜品操作
    window.db.init = async function() {
      const defaults = [
        { id: 'all', name: '全部', order: 0 },
        { id: 'main', name: '主食', order: 1 },
        { id: 'soup', name: '汤品', order: 2 },
        { id: 'dessert', name: '甜点', order: 3 }
      ];
      for (const cat of defaults) {
        const doc = await firestore.collection('categories').doc(cat.id).get();
        if (!doc.exists) {
          await firestore.collection('categories').doc(cat.id).set(cat);
        }
      }
    };

    window.db.getDishes = async function(category = null) {
      let query = firestore.collection('dishes');
      if (category && category !== 'all') {
        query = query.where('category', '==', category);
      }
      const snapshot = await query.get();
      return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    };

    window.db.getDish = async function(id) {
      const doc = await firestore.collection('dishes').doc(id).get();
      if (doc.exists) return { id: doc.id, ...doc.data() };
      return null;
    };

    window.db.addDish = async function(dish) {
      let imageData = dish.image;
      if (dish.image instanceof Blob) {
        imageData = await blobToBase64(dish.image);
      }
      const dishData = { ...dish, image: imageData, createdAt: Date.now() };
      await firestore.collection('dishes').doc(dish.id).set(dishData);
      return dish.id;
    };

    window.db.updateDish = async function(dish) {
      let imageData = dish.image;
      if (dish.image instanceof Blob) {
        imageData = await blobToBase64(dish.image);
      }
      const dishData = { ...dish, image: imageData };
      await firestore.collection('dishes').doc(dish.id).set(dishData);
      return dish.id;
    };

    window.db.deleteDish = async function(id) {
      await firestore.collection('dishes').doc(id).delete();
    };

    window.db.getCategories = async function() {
      const snapshot = await firestore.collection('categories').orderBy('order').get();
      return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    };

    window.db.getCategory = async function(id) {
      const doc = await firestore.collection('categories').doc(id).get();
      if (doc.exists) return { id: doc.id, ...doc.data() };
      return null;
    };

    window.db.addCategory = async function(category) {
      await firestore.collection('categories').doc(category.id).set(category);
      return category.id;
    };

    window.db.updateCategory = async function(category) {
      await firestore.collection('categories').doc(category.id).set(category);
      return category.id;
    };

    window.db.deleteCategory = async function(id) {
      const dishesSnapshot = await firestore.collection('dishes').where('category', '==', id).get();
      const batch = firestore.batch();
      dishesSnapshot.docs.forEach(doc => batch.update(doc.ref, { category: 'all' }));
      await batch.commit();
      await firestore.collection('categories').doc(id).delete();
    };

    window.db.getOrders = async function() {
      const snapshot = await firestore.collection('orders').orderBy('createdAt', 'desc').get();
      return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    };

    window.db.getOrder = async function(id) {
      const doc = await firestore.collection('orders').doc(id).get();
      if (doc.exists) return { id: doc.id, ...doc.data() };
      return null;
    };

    window.db.addOrder = async function(order) {
      await firestore.collection('orders').doc(order.id).set(order);
      return order.id;
    };

    // 通知 app.js 可以开始了
    window.firebaseReady = true;
    if (window.onFirebaseReady) window.onFirebaseReady();
  </script>
  <script src="js/app.js"></script>
</body>
</html>
